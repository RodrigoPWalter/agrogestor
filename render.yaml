services:
  - type: web
    name: agrogestor-api-rodrigowalter
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v3/api-docs
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: https://agrogestor-api-rodrigowalter.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://agrogestor-rodrigowalter.onrender.com
      - key: APP_ADMIN_NAME
        value: Administrador
      - key: APP_ADMIN_EMAIL
        value: admin@agrogestor.app
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_ADMIN_ENABLED
        value: "true"

  - type: web
    name: agrogestor-rodrigowalter
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://agrogestor-api-rodrigowalter.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
