services:
  postgres:
    image: postgres:17-alpine
    container_name: agrogestor-postgres
    environment:
      POSTGRES_DB: agrogestor
      POSTGRES_USER: agrogestor
      POSTGRES_PASSWORD: agrogestor
    ports:
      - "5432:5432"
    volumes:
      - agrogestor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrogestor -d agrogestor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agrogestor_postgres_data:
