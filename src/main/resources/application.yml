spring:
  application:
    name: agrogestor
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrogestor}
    username: ${DB_USERNAME:agrogestor}
    password: ${DB_PASSWORD:agrogestor}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

server:
  error:
    include-message: never

agrogestor:
  security:
    jwt-secret: ${JWT_SECRET:agrogestor-local-development-secret-change-in-production}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
    jwt-issuer: https://agrogestor.local
    bootstrap-admin:
      enabled: ${APP_ADMIN_ENABLED:true}
      name: ${APP_ADMIN_NAME:Administrador}
      email: ${APP_ADMIN_EMAIL:admin@agrogestor.local}
      password: ${APP_ADMIN_PASSWORD:AgroGestor@2026}
  weather:
    latitude: ${WEATHER_LATITUDE:-27.6736}
    longitude: ${WEATHER_LONGITUDE:-53.8056}
    location-name: ${WEATHER_LOCATION_NAME:Campo Novo - RS}
